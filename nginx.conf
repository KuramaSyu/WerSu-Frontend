server {
    listen       5173;
    listen       [::]:5173;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reasonable defaults for a SPA.
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Cache hashed assets aggressively, don't cache index.html.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never serve index.html from cache so deploys roll out cleanly.
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Proxy API traffic to the backend service in the compose network.
    # Adjust the upstream name to match your compose service.
    location /api/ {
        proxy_pass         http://wersu-rest:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: any unknown path falls back to index.html so client-side
    # routing works on refresh / deep-links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}